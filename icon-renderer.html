<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toybox Trio Icon Renderer</title>
    <style>
      html,
      body {
        display: grid;
        width: 100%;
        height: 100%;
        margin: 0;
        place-items: center;
        overflow: hidden;
        background:
          linear-gradient(45deg, #e8ebf7 25%, transparent 25%),
          linear-gradient(-45deg, #e8ebf7 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #e8ebf7 75%),
          linear-gradient(-45deg, transparent 75%, #e8ebf7 75%),
          #f8f9ff;
        background-position: 0 0, 0 16px, 16px -16px, -16px 0;
        background-size: 32px 32px;
      }

      canvas {
        width: 512px;
        height: 512px;
      }
    </style>
  </head>
  <body>
    <canvas id="icon-canvas" width="512" height="512"></canvas>
    <img id="icon-output" alt="" hidden />
    <script type="module" src="/src/icon-renderer.ts"></script>
  </body>
</html>
